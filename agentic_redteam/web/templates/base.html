<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title }} — PyRIT Red-Team</title>
  <script src="/static/tailwind-cdn.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'gray-925': '#0d1117',
            'gray-850': '#161b22',
          }
        }
      }
    }
  </script>
  <style>
    [x-cloak]{display:none!important}
    .sidebar-glow { box-shadow: inset -1px 0 0 rgba(239,68,68,0.08); }
  </style>
</head>
<body class="h-full bg-gray-925 text-gray-100 flex" x-data>

  <!-- Sidebar -->
  <aside class="w-60 flex-shrink-0 bg-gray-850 border-r border-gray-800/80 flex flex-col h-screen sticky top-0 z-10 sidebar-glow">

    <!-- Logo -->
    <div class="px-5 py-5 border-b border-gray-800/60">
      <div class="flex items-center gap-2.5">
        <div class="w-8 h-8 rounded-lg bg-red-600/20 border border-red-500/30 flex items-center justify-center flex-shrink-0">
          <span class="text-red-400 text-base leading-none">⚡</span>
        </div>
        <div>
          <div class="text-white font-bold text-sm tracking-wide leading-tight">PyRIT</div>
          <div class="text-gray-500 text-xs leading-tight">Red-Team Platform</div>
        </div>
      </div>
    </div>

    <!-- Nav -->
    <nav class="flex-1 px-3 py-4 space-y-1">
      <a href="/"
         class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-all
                {% if current_path == '/' %}text-white bg-red-600/20 border border-red-500/20{% else %}text-gray-400 hover:text-gray-100 hover:bg-gray-800/60{% endif %}">
        <span class="text-base leading-none {% if current_path == '/' %}text-red-400{% endif %}">⚡</span>
        <span>New Run</span>
      </a>
      <a href="/runs"
         class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-all
                {% if current_path.startswith('/runs') %}text-white bg-red-600/20 border border-red-500/20{% else %}text-gray-400 hover:text-gray-100 hover:bg-gray-800/60{% endif %}">
        <span class="text-base leading-none {% if current_path.startswith('/runs') %}text-red-400{% endif %}">📋</span>
        <span>Run History</span>
      </a>
    </nav>

    <!-- Footer -->
    <div class="px-4 py-4 border-t border-gray-800/60 space-y-2">
      {% if demo_mode %}
      <span class="inline-flex items-center gap-1.5 bg-amber-950/60 text-amber-400 text-xs font-medium px-2.5 py-1 rounded-lg border border-amber-800/50">
        <span class="w-1.5 h-1.5 bg-amber-400 rounded-full animate-pulse"></span>DEMO MODE
      </span>
      {% endif %}
      <div class="flex items-center justify-between">
        <div class="text-gray-600 text-xs font-mono">v0.13.0</div>
        <div class="text-gray-700 text-xs">PyRIT</div>
      </div>
    </div>
  </aside>

  <!-- Main content -->
  <main class="flex-1 overflow-y-auto min-h-screen">
    {% block body %}{% endblock %}
  </main>

  <script src="/static/htmx.min.js"></script>
  <script src="/static/htmx-ext-sse.js"></script>
  <script src="/static/alpine.min.js" defer></script>
</body>
</html>
